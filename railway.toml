[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/actuator/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[env]
SPRING_PROFILES_ACTIVE = "prod"
SERVER_PORT = "8080"

[[services]]
name = "user-service"

[services.ports]
port = 8080

[services.env]
SPRING_PROFILES_ACTIVE = "prod"
SERVER_PORT = "8080"
